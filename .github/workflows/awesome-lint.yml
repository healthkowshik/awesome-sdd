name: Awesome Lint

on:
  pull_request:
    branches:
      - main
    paths:
      - README.md
      - contributing.md

jobs:
  awesome-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4

      - name: Run awesome-lint
        run: npx awesome-lint
